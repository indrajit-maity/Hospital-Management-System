spring.application.name=ManagedHospital

#Spring-config
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=prod
spring.security.user.name=Indra
spring.security.user.password=pass


#Mysql connection
#SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/Hospital

spring.datasource.url=${DB_URL}
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

#Mysql Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Flyway migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
#this is use for predefine database version and avoid error when we run flyway migration for first time in existing database
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

#Hibernate
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=none



server.servlet.context-path=/indra
#server.port=8080



jwt.secretKey=${JWT_SECRET}